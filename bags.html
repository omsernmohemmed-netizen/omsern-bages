<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الشنط - مامتو</title>
<style>
body{background:#fff0f5;margin:0;font-family:Arial;text-align:center}
header{background:#e91e63;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
nav a{color:white;text-decoration:none;font-weight:bold;margin:5px;padding:6px 10px;background:rgba(0,0,0,0.1);border-radius:8px}
#cart-btn{background:white;color:#e91e63;border:0;border-radius:10px;padding:8px 12px;font-weight:bold;cursor:pointer}
section{padding:30px}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:white;border-radius:15px;padding:15px;text-align:right;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.card img{width:100%;height:220px;object-fit:cover;border-radius:10px}
.btn{background:#25D366;color:white;padding:10px;border:0;border-radius:10px;width:100%;margin-top:8px;font-weight:bold;cursor:pointer}
#cart-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6)}
.cart-content{background:white;max-width:400px;margin:60px auto;padding:20px;border-radius:15px;text-align:right}
</style>
</head>
<body>
<header>
  <div style="font-weight:bold;font-size:22px">👜 مامتو</div>
  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="shop.html">الشنط</a>
  </nav>
  <button id="cart-btn" onclick="document.getElementById('cart-modal').style.display='block'">🛒 السلة <span id="cart-count">0</span></button>
</header>

<section>
  <h2 style="color:#e91e63">الشنط المتوفرة</h2>
  <div class="container">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1584917865442-7d826a6e0113?w=400">
      <h3>شنطة جلد اسود</h3>
      <b>40,000 جنيه</b>
      <button class="btn" onclick="alert('تمت الاضافة ✅');document.getElementById('cart-count').innerText=1">+ اضافة للسلة</button>
    </div>
  </div>
</section>

<div id="cart-modal" onclick="this.style.display='none'">
  <div class="cart-content" onclick="event.stopPropagation()">
    <h3>السلة</h3><p>دي سلة تجربة. اضغطي بره عشان تقفل</p>
  </div>
</div>
</body>
</html>
