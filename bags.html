<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشنط - متجر مامتو</title>
<style>
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#fff0f5;margin:0;padding:0;text-align:center}
header{background:#e91e63;color:white;padding:15px 10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
nav{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
nav a{color:white;text-decoration:none;font-weight:bold;font-size:14px;padding:6px 10px;background:rgba(0,0,0,0.1);border-radius:8px}
#cart-btn{background:white;color:#e91e63;border:none;border-radius:10px;padding:8px 12px;font-weight:bold;cursor:pointer;margin-top:10px}
section{padding:40px 20px;max-width:1100px;margin:auto}
h2{color:#e91e63;font-size:28px;margin-bottom:20px}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;text-align:right}
.card{background:white;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1);padding:15px}
.card img{width:100%;border-radius:10px;height:220px;object-fit:cover}
.price{font-size:20px;font-weight:bold;color:#000;margin:5px 0}
.qty{color:#333;font-size:14px}
.btn{display:inline-block;background:#25D366;color:white;padding:10px 15px;border-radius:10px;text-decoration:none;font-weight:bold;margin:5px 0;cursor:pointer;border:none;width:100%}
.btn-del{background:#f44336}
footer{background:#e91e63;color:white;text-align:center;padding:15px;margin-top:30px}
#cart-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:20}
.cart-content{background:white;max-width:500px;margin:50px auto;padding:20px;border-radius:15px;max-height:80vh;overflow-y:auto;text-align:right}
.cart-item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:10px 0}
</style>
<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let stock = {p1:5, p2:8, p3:3}; // هنا الكمية. نقصيها يدوي

function addToCart(id,name,price){
  if(stock[id]<=0){alert('الكمية خلصت');return;}
  cart.push({id,name,price});
  localStorage.setItem('cart',JSON.stringify(cart));
  updateCartCount();
  alert('تمت الاضافة للسلة ✅');
}
function removeFromCart(index){
  cart.splice(index,1);
  localStorage.setItem('cart',JSON.stringify(cart));
  showCart();
}
function showCart(){
  document.getElementById('cart-modal').style.display='block';
  let html = '';
  let total = 0;
  cart.forEach((item,i)=>{
    html += `<div class="cart-item"><div>${item.name}<br><b>${item.price}</b></div><button class="btn-del btn" onclick="removeFromCart(${i})">حذف</button></div>`;
    total += parseInt(item.price.replace(/[^0-9]/g,''));
  });
  document.getElementById('cart-items').innerHTML = html || '<p>السلة فاضية</p>';
  document.getElementById('cart-total').innerText = 'الاجمالي: ' + total.toLocaleString() + ' جنيه';
}
function closeCart(){document.getElementById('cart-modal').style.display='none';}
function checkout(){
  if(cart.length==0){alert('السلة فاضية');return;}
  let msg = 'سلام عليكم، عايزة اطلب:\n';
  cart.forEach(item=>{msg += `- ${item.name}\n`; stock[item.id]--; }); // هنا بنقص الكمية
  msg += '\n' + document.getElementById('cart-total').innerText;
  localStorage.setItem('cart',JSON.stringify([]));
  cart=[];
  updateCartCount();
  closeCart();
  alert('تم الشراء! الكمية نقصت. كملي الطلب واتساب');
  window.open('https://wa.me/2499094790?text='+encodeURIComponent(msg));
}
function updateCartCount(){
  document.getElementById('cart-count').innerText = cart.length;
}
window.onload=updateCartCount;
</script>
</head>
<body>
<header>
  <div style="font-size:22px;font-weight:bold">👜 مامتو</div>
  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">حول المتجر</a>
    <a href="shop.html">الشنط</a>
    <a href="payment.html">الدفع</a>
    <a href="account.html">حسابي</a>
    <a href="contact.html">استفسار</a>
  </nav>
  <button id="cart-btn" onclick="showCart()">🛒 السلة <span id="cart-count">0</span></button>
</header>

<section>
  <h2>الشنط المتوفرة</h2>
  <div class="container">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1584917865442-7d826a6e0113?w=400">
      <h3>شنطة جلد اسود فخمة</h3><p>عملية وكبيرة</p>
      <div class="price">40,000 جنيه</div>
      <div class="qty">متوفر: <script>document.write(stock.p1)</script> قطع</div>
      <button class="btn" onclick="addToCart('p1','شنطة جلد اسود فخمة','40,000 جنيه')">+ اضافة للسلة</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1566150905458-1bf1fc113f0d?w=400">
      <h3>شنطة كتف بني كلاسيك</h3><p>ستايل راقي</p>
      <div class="price">28,000 جنيه</div>
      <div class="qty">متوفر: <script>document.write(stock.p2)</script> قطع</div>
      <button class="btn" onclick="addToCart('p2','شنطة كتف بني كلاسيك','28,000 جنيه')">+ اضافة للسلة</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400">
      <h3>شنطة ظهر وردي كيوت</h3><p>شبابية وعملية</p>
      <div class="price">22,000 جنيه</div>
      <div class="qty">متوفر: <script>document.write(stock.p3)</script> قطع</div>
      <button class="btn" onclick="addToCart('p3','شنطة ظهر وردي كيوت','22,000 جنيه')">+ اضافة للسلة</button>
    </div>
  </div>
</section>

<!-- نافذة السلة -->
<div id="cart-modal">
  <div class="cart-content">
    <h2>سلة المشتريات</h2>
    <div id="cart-items"></div>
    <h3 id="cart-total"></h3>
    <button class="btn" onclick="checkout()">تم الشراء</button>
    <button class="btn-del btn" onclick="closeCart()">اغلاق</button>
  </div>
</div>

<footer>© 2026 متجر مامتو</footer>
</body>
</html>
